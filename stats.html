<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPX 통계</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .stats-header {
            text-align: center;
            margin-bottom: 20px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9ecef;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stats-card {
            background: #ffffff;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9ecef;
        }
        
        .stats-card h3 {
            margin-bottom: 15px;
            color: #212529;
            border-bottom: 2px solid #212529;
            padding-bottom: 8px;
            font-weight: 600;
            font-size: 1rem;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-weight: 500;
            color: #495057;
            font-size: 0.9rem;
        }
        
        .stat-value {
            font-weight: 600;
            color: #212529;
            font-size: 0.9rem;
        }
        
        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 15px;
        }
        
        .case-stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .case-stat-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #212529;
        }
        
        .case-stat-title {
            font-weight: 600;
            color: #212529;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        
        .case-stat-count {
            font-size: 1.2rem;
            font-weight: bold;
            color: #212529;
        }
        
        .checklist-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .checklist-stat-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        
        .checklist-stat-label {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 4px;
        }
        
        .checklist-stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #212529;
        }
        
        .recent-sessions {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .session-item:last-child {
            border-bottom: none;
        }
        
        .session-info {
            flex: 1;
        }
        
        .session-case {
            font-weight: 600;
            color: #212529;
            font-size: 0.9rem;
        }
        
        .session-time {
            font-size: 0.8rem;
            color: #6c757d;
        }
        
        .session-duration {
            font-weight: 600;
            color: #212529;
            font-size: 0.9rem;
        }
        
        .export-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .export-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .export-csv {
            background: #28a745;
            color: white;
        }
        
        .export-csv:hover {
            background: #218838;
        }
        
        .export-json {
            background: #6c757d;
            color: white;
        }
        
        .export-json:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <!-- 사이드바 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>CPX</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-btn">
                <span class="icon">📝</span>
                <span class="text">시험</span>
            </a>
            <a href="admin.html" class="sidebar-btn">
                <span class="icon">⚙️</span>
                <span class="text">관리</span>
            </a>
            <a href="stats.html" class="sidebar-btn active">
                <span class="icon">📊</span>
                <span class="text">통계</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="stats-container">
            <!-- 헤더 -->
            <div class="stats-header">
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">CPX 통계</h1>
                <p style="font-size: 0.9rem; margin: 0;">체크리스트 항목 및 연습한 증례 통계를 확인할 수 있습니다.</p>
            </div>

        <!-- 전체 통계 -->
        <div class="stats-grid">
            <!-- 기본 통계 -->
            <div class="stats-card">
                <h3>기본 통계</h3>
                <div class="stat-item">
                    <span class="stat-label">총 연습 횟수</span>
                    <span class="stat-value" id="totalSessions">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">연습한 증례 수</span>
                    <span class="stat-value" id="uniqueCases">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">평균 소요 시간</span>
                    <span class="stat-value" id="avgTime">0분</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">완료율</span>
                    <span class="stat-value" id="completionRate">0%</span>
                </div>
            </div>

            <!-- 시간대별 연습 -->
            <div class="stats-card">
                <h3>시간대별 연습</h3>
                <div class="chart-container">
                    <canvas id="timeChart"></canvas>
                </div>
            </div>

            <!-- 증례별 연습 횟수 -->
            <div class="stats-card">
                <h3>증례별 연습 횟수</h3>
                <div class="case-stats" id="caseStats">
                    <!-- 증례별 통계가 여기에 표시됩니다 -->
                </div>
            </div>

            <!-- 체크리스트 통계 -->
            <div class="stats-card">
                <h3>체크리스트 통계</h3>
                <div class="checklist-stats" id="checklistStats">
                    <!-- 체크리스트 통계가 여기에 표시됩니다 -->
                </div>
            </div>
        </div>

        <!-- 최근 세션 -->
        <div class="stats-card">
            <h3>최근 연습 세션</h3>
            <div class="recent-sessions" id="recentSessions">
                <!-- 최근 세션이 여기에 표시됩니다 -->
            </div>
        </div>

        <!-- 내보내기 버튼 -->
        <div class="export-buttons">
            <button class="export-btn export-csv" onclick="exportToCSV()">CSV 내보내기</button>
            <button class="export-btn export-json" onclick="exportToJSON()">JSON 내보내기</button>
        </div>

        </div>
    </div>

    <script src="js/stats.js"></script>
</body>
</html>
