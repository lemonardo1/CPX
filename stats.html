<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CPX 통계</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #0b0c10;
            --fg: #eaeef3;
            --muted: #9aa4af;
            --accent: #4f8cff;
            --accent-strong: #316cff;
            --card: #11141a;
            --card-border: #252b36;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --fg: #0b0c10;
                --muted: #51606f;
                --accent: #1e66ff;
                --accent-strong: #0b57f0;
                --card: #f6f8fa;
                --card-border: #e2e8f0;
            }
        }

        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--fg);
        }
        .container { max-width: 980px; margin: 0 auto; padding: 24px; }
        h1 { margin: 0 0 8px; font-size: clamp(18px, 2.4vw, 24px); font-weight: 700; }
        .muted { color: var(--muted); font-size: 13px; }
        .card { border: 1px solid var(--card-border); background: var(--card); border-radius: 12px; padding: 16px; }
        .grid { display: grid; gap: 12px; }
        .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
        .labels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
        .chip { border: 1px solid var(--card-border); border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; gap: 8px; align-items: center; background: var(--card); }
        .bar { height: 6px; width: 100%; background: rgba(79,140,255,.18); border-radius: 999px; overflow: hidden; }
        .bar > span { display: block; height: 100%; background: var(--accent); width: 0%; }
        table { width: 100%; border-collapse: collapse; border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; }
        thead th { text-align: left; font-size: 13px; color: var(--muted); background: rgba(0,0,0,0.05); padding: 10px 12px; border-bottom: 1px solid var(--card-border); }
        tbody td { padding: 10px 12px; border-bottom: 1px solid var(--card-border); font-size: 14px; }
        tbody tr:last-child td { border-bottom: 0; }
        a.btn { display: inline-block; padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 10px; text-decoration: none; color: var(--fg); background: var(--card); }
    </style>
    <meta name="theme-color" content="#1e66ff">
    <link rel="icon" href="data:,">
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
        document.addEventListener('DOMContentLoaded', () => initStats());

        async function initStats() {
            const CHECKLIST_LABELS = ['O','L','D','Co','Ex','C','A','F','E','외','과','약','사','가','여','P/E'];

            const $ = (sel) => document.querySelector(sel);
            const fmtPct = (num, den) => den === 0 ? '—' : Math.round((num / den) * 100);
            const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));

            let cases = [];
            let byTitle = new Map();
            let categoryMap = {};
            try {
                const res = await fetch('cases.json', { cache: 'no-store' });
                const data = await res.json();
                cases = Array.isArray(data.cases) ? data.cases : [];
                categoryMap = (data && typeof data.categorySubChecklists === 'object' && data.categorySubChecklists) || {};
                cases.forEach(c => { byTitle.set(c.title, c); });
            } catch (_) {
                // ignore; minimal stats will still work for main checklist
            }

            let logs = [];
            try {
                const res = await fetch('log.json', { cache: 'no-store' });
                const text = await res.text();
                if (text && text.trim().length) logs = JSON.parse(text);
                if (!Array.isArray(logs)) logs = [];
            } catch (_) {
                logs = [];
            }

            render(logs, cases, byTitle, categoryMap, CHECKLIST_LABELS);

            function getExpectedSubItemsForCaseTitle(title) {
                const c = byTitle.get(title);
                if (!c) return null;
                const catItems = Array.isArray(categoryMap[c.category]) ? categoryMap[c.category] : [];
                const caseItems = Array.isArray(c.subChecklist) ? c.subChecklist : [];
                const set = new Set([...catItems, ...caseItems].filter(Boolean));
                return Array.from(set);
            }

            function render(logs, cases, byTitle, categoryMap, CHECKLIST_LABELS) {
                const sessionsTotal = logs.length;
                let sumMainPct = 0, sumSubPct = 0, sumCombinedPct = 0;
                const labelHit = new Map(CHECKLIST_LABELS.map(l => [l, { yes: 0, total: 0 }]));
                const countByDate = new Map();

                const tbody = $('#sessionsBody');
                tbody.innerHTML = '';

                logs.forEach((entry) => {
                    const main = (entry && entry.checklist && entry.checklist.main) || {};
                    const sub = (entry && entry.checklist && entry.checklist.sub) || {};
                    const caseTitle = entry && entry.case ? String(entry.case) : '';

                    const mainTotal = CHECKLIST_LABELS.length;
                    let mainChecked = 0;
                    CHECKLIST_LABELS.forEach(l => {
                        const v = Boolean(main[l]);
                        if (v) mainChecked += 1;
                        const agg = labelHit.get(l);
                        agg.total += 1;
                        if (v) agg.yes += 1;
                    });

                    const expectedSub = getExpectedSubItemsForCaseTitle(caseTitle);
                    const subTotal = expectedSub ? expectedSub.length : Object.keys(sub).length;
                    let subChecked = 0;
                    if (expectedSub) {
                        expectedSub.forEach(l => { if (sub[l]) subChecked += 1; });
                    } else {
                        Object.keys(sub).forEach(k => { if (sub[k]) subChecked += 1; });
                    }

                    const mainPct = mainTotal ? (mainChecked / mainTotal) : 0;
                    const subPct = subTotal ? (subChecked / subTotal) : 0;
                    const combinedPct = (mainChecked + subChecked) / ((mainTotal) + (subTotal || 0) || 1);

                    sumMainPct += mainPct;
                    sumSubPct += subPct;
                    sumCombinedPct += combinedPct;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escapeHtml(caseTitle || '—')}</td>
                        <td>${mainChecked}/${mainTotal} (${Math.round(mainPct*100)}%)</td>
                        <td>${subTotal ? `${subChecked}/${subTotal} (${Math.round(subPct*100)}%)` : '—'}</td>
                        <td>${Math.round(combinedPct*100)}%</td>
                    `;
                    tbody.appendChild(tr);

                    // Date aggregation (prefer entry.date else derive from entry.timestamp)
                    let d = (entry && entry.date) ? String(entry.date) : '';
                    if (!d) {
                        const ts = (entry && entry.timestamp) ? String(entry.timestamp) : '';
                        if (ts && ts.length >= 10) d = ts.slice(0,10);
                    }
                    if (!d) d = '—';
                    countByDate.set(d, (countByDate.get(d) || 0) + 1);
                });

                const avgMain = sessionsTotal ? Math.round((sumMainPct / sessionsTotal) * 100) : 0;
                const avgSub = sessionsTotal ? Math.round((sumSubPct / sessionsTotal) * 100) : 0;
                const avgCombined = sessionsTotal ? Math.round((sumCombinedPct / sessionsTotal) * 100) : 0;

                $('#summarySessions').textContent = String(sessionsTotal);
                $('#summaryMain').textContent = sessionsTotal ? `${avgMain}%` : '—';
                $('#summarySub').textContent = sessionsTotal ? `${avgSub}%` : '—';
                $('#summaryCombined').textContent = sessionsTotal ? `${avgCombined}%` : '—';

                const labelsGrid = $('#labelsGrid');
                labelsGrid.innerHTML = '';
                CHECKLIST_LABELS.forEach(label => {
                    const agg = labelHit.get(label) || { yes: 0, total: 0 };
                    const pct = agg.total ? Math.round((agg.yes / agg.total) * 100) : 0;
                    const el = document.createElement('div');
                    el.className = 'chip';
                    el.innerHTML = `
                        <span>${label}</span>
                        <span style="min-width:48px;text-align:right;">${agg.total ? pct + '%' : '—'}</span>
                    `;
                    labelsGrid.appendChild(el);
                });

                // Render by-date table (descending by date, '—' last)
                const byDateBody = document.getElementById('byDateBody');
                if (byDateBody) {
                    byDateBody.innerHTML = '';
                    const rows = Array.from(countByDate.entries());
                    rows.sort((a, b) => {
                        if (a[0] === '—') return 1;
                        if (b[0] === '—') return -1;
                        return a[0] < b[0] ? 1 : (a[0] > b[0] ? -1 : 0);
                    });
                    rows.forEach(([date, count]) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${escapeHtml(date)}</td><td>${count}</td>`;
                        byDateBody.appendChild(tr);
                    });
                }
            }
        }
    </script>

<body>
    <div class="container">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;">
            <h1>CPX 통계</h1>
            <a class="btn" href="/index.html">타이머로 돌아가기</a>
        </div>

        <div class="grid cols-2" style="margin-bottom:16px;">
            <div class="card">
                <div class="muted">총 세션</div>
                <div style="font-size:24px;font-weight:700;" id="summarySessions">0</div>
            </div>
            <div class="card">
                <div class="muted">평균 메인 체크</div>
                <div style="font-size:24px;font-weight:700;" id="summaryMain">—</div>
            </div>
            <div class="card">
                <div class="muted">평균 세부 체크</div>
                <div style="font-size:24px;font-weight:700;" id="summarySub">—</div>
            </div>
            <div class="card">
                <div class="muted">평균 종합</div>
                <div style="font-size:24px;font-weight:700;" id="summaryCombined">—</div>
            </div>
        </div>

        <div class="card" style="margin-bottom:16px;">
            <div class="muted" style="margin-bottom:8px;">메인 라벨 커버리지</div>
            <div class="labels-grid" id="labelsGrid"></div>
        </div>

        <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">
                <div class="muted">세션별 상세</div>
            </div>
            <div style="overflow:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>증례</th>
                            <th>메인</th>
                            <th>세부</th>
                            <th>종합</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-top:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                <div class="muted">날짜별 연습 횟수</div>
            </div>
            <div style="overflow:auto; margin-top:8px;">
                <table>
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>횟수</th>
                        </tr>
                    </thead>
                    <tbody id="byDateBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>
